{{- if .Values.redis.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anvil.redisFullname" . }}
  labels:
    {{- include "anvil.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "anvil.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "anvil.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        # AOF lives here. emptyDir means it is not durable across pod restarts;
        # for durable Redis, move off this in-cluster Deployment (see values.yaml).
        - name: data
          emptyDir: {}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          # noeviction so queued jobs are never dropped under memory pressure.
          args:
            - "--appendonly"
            - "yes"
            - "--maxmemory-policy"
            - "noeviction"
            - "--dir"
            - "/data"
          volumeMounts:
            - name: data
              mountPath: /data
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
