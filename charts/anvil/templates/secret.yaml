{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "anvil.secretName" . }}
  labels:
    {{- include "anvil.labels" . | nindent 4 }}
type: Opaque
stringData:
  webhook-secret: {{ required "secret.webhookSecret is required when secret.create is true" .Values.secret.webhookSecret | quote }}
{{- end }}
